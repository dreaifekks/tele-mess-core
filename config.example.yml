storage:
  data_dir: "./data"
  database: "./data/archive.db"
  raw_json_retention_days: 7

telegram:
  backfill:
    enabled: true
    initial_limit: 1000
    catch_up_limit: 1000
  media_download:
    retries: 2
    retry_delay_seconds: 1.0
  accounts:
    - account_id: "main"
      api_id: 123456
      api_hash: "your_api_hash_here"
      session_name: "main"
      session_dir: "./data/sessions"
      timezone: "Asia/Tokyo"
    - account_id: "alt"
      api_id: 654321
      api_hash: "another_api_hash_here"
      session_name: "alt"
      session_dir: "./data/sessions"
      timezone: "Asia/Tokyo"

server:
  host: "127.0.0.1"
  port: 8765
  # Required by default, including on localhost. Generate a long random value.
  token: "replace-with-a-long-random-token"
  # For isolated local development only. This is rejected on non-loopback hosts.
  allow_unauthenticated_localhost: false

daily:
  output_dir: "./data/daily-packages"
  # Optional. Defaults to "~/.config/systemd/user" when installing the timer.
  systemd_user_dir: "~/.config/systemd/user"
  cli_path: "tele-mess-core"
  ai:
    provider: "codex-cli"
    command:
      - "codex"
      - "-a"
      - "never"
      - "exec"
      - "--skip-git-repo-check"
      - "--output-last-message"
      - "{output}"
      # Expanded to repeated "--image <path>" args for image-analysis tasks.
      - "{images}"
      # Optional placeholder for wrappers/logging: media_image_analysis,
      # normal_origin_key_extraction, normal_group_analysis,
      # important_origin_analysis, or final_daily_summary.
      # - "{task}"
      - "-"
    timeout_seconds: 900
  delivery:
    # YAML is the fallback. PATCH /manage/daily-summary-delivery persists an
    # SQLite override that scheduled and background runs read automatically.
    enabled: false
    # Send the final daily summary through this authenticated account.
    account_id: "main"
    # Telegram group/channel ID from GET /manage/origins?account_id=main.
    origin_id: -1001234567890
    # Optional forum topic ID. Leave as 0 to send to the group/channel root.
    topic_id: 0

logging:
  level: "INFO"
  file: "./logs/tele-mess-core.log"
